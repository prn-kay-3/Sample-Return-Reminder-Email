<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Safety Email Builder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
    :root {
      --bg: #131313;
      --bg-card: #1c1c1c;
      --bg-input: #242424;
      --border: #2e2e2e;
      --border-focus:#fff833;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #fff833;
      --accent2: #ffba24;
      --success: #4ade80;
      --radius: 10px;
      --transition: 0.22s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.6;
    }
    body::after {
      background-image:
        linear-gradient(rgba(255,248,51,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,248,51,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .app-wrap {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      animation: fadeSlideDown 0.5s ease both;
    }
    .header-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      letter-spacing: -0.02em;
      color: #fff;
    }
    .header-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      animation: fadeSlideUp 0.5s ease both;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .field { margin-bottom: 1.1rem; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.45rem;
    }
    .field:focus-within label { color: var(--accent); }
    input, select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      padding: 0.75rem 0.875rem;
      outline: none;
      transition: all var(--transition);
      min-height: 48px;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,248,51,0.12);
      background: #2a2a2a;
    }
    .auto-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(255,186,36,0.1);
      border: 1px solid rgba(255,186,36,0.25);
      border-radius: 100px;
      padding: 0.1rem 0.5rem;
      margin-left: 0.4rem;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      font-weight: 500;
      cursor: pointer;
      border: none;
      min-height: 48px;
      transition: all var(--transition);
      flex: 1;
    }
    .btn-primary { background: var(--accent); color: #131313; }
    .btn-primary:hover { background: #ffe84a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,248,51,0.25); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(255,186,36,0.06);
    }
    .email-preview {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      font-size: 0.8rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }
    .subject-line {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
    }
    .token {
      background: rgba(255,248,51,0.13);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 3px;
      font-style: italic;
    }
    strong { color: #fff; font-weight: 600; }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #0a1f12;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.65rem 1.25rem;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 1000;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      opacity: 0;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="app-wrap">
  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.5 7 5 10.5 5 14a7 7 0 0014 0c0-3.5-3.5-7-7-12z" fill="#131313"/>
        <path d="M9 16.5A3.5 3.5 0 0012.5 20" stroke="#131313" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Water Safety Email Builder</h1>
      <p>Automated chase-up emails for water sampling kits</p>
    </div>
  </header>

  <!-- VARIABLES CARD -->
  <section class="card">
    <div class="card-title">Variables</div>
    <div class="field">
      <label for="recipient">To (Recipient)</label>
      <input type="email" id="recipient" placeholder="tenant@example.com" />
    </div>
    <div class="field">
      <label for="cc">CC (optional)</label>
      <input type="text" id="cc" placeholder="manager@example.com, supervisor@example.com" />
    </div>
    <div class="field">
      <label for="propertyAddress">Property Address</label>
      <input type="text" id="propertyAddress" placeholder="e.g. 42 Oak Street, Manchester, M1 2AB" />
    </div>
    <div class="field">
      <label for="lettingAgentName">Letting Agent Name</label>
      <input type="text" id="lettingAgentName" placeholder="e.g. Smith & Co Lettings" />
    </div>
    <div class="field">
      <label for="tenantName">Tenant Name</label>
      <input type="text" id="tenantName" placeholder="e.g. Mr. James Carter" />
    </div>
    <div class="field">
      <label for="timeOfDay">Time of Day <span class="auto-badge" id="autoBadge">⚡ Auto-detected</span></label>
      <select id="timeOfDay">
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Evening">Evening</option>
      </select>
    </div>
    <div class="field">
      <label for="deliveryDate">Delivery Date</label>
      <input type="date" id="deliveryDate" />
    </div>
  </section>

  <!-- ACTIONS -->
  <section class="card">
    <div class="card-title">Send</div>
    <div class="actions">
      <button class="btn btn-primary" onclick="copyEmail()">Copy Email</button>
      <button class="btn btn-secondary" onclick="openMailto()">Open in Mail</button>
    </div>
  </section>

  <!-- PREVIEW -->
  <section class="card">
    <div class="card-title">Preview</div>
    <div class="email-preview" id="emailPreview">
      <div class="subject-line" id="previewSubject"></div>
      <div id="previewBody"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast">
  <span id="toastMsg">Copied to clipboard!</span>
</div>

<script>
  const fields = {
    recipient: document.getElementById('recipient'),
    cc: document.getElementById('cc'),
    propertyAddress: document.getElementById('propertyAddress'),
    lettingAgentName: document.getElementById('lettingAgentName'),
    tenantName: document.getElementById('tenantName'),
    timeOfDay: document.getElementById('timeOfDay'),
    deliveryDate: document.getElementById('deliveryDate'),
  };

  const previewSubject = document.getElementById('previewSubject');
  const previewBody = document.getElementById('previewBody');
  const autoBadge = document.getElementById('autoBadge');

  // Auto-detect time
  function detectTimeOfDay() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return 'Morning';
    if (h >= 12 && h < 18) return 'Afternoon';
    return 'Evening';
  }

  // Initialize time
  (function init() {
    fields.timeOfDay.value = detectTimeOfDay();
  })();

  function formatDate(val) {
    if (!val) return '{{DeliveryDate}}';
    const date = new Date(val);
    const day = date.getDate();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${day} ${months[date.getMonth()]}, ${date.getFullYear()}`;
  }

  function getValues() {
    return {
      recipient: fields.recipient.value.trim(),
      cc: fields.cc.value.trim(),
      address: fields.propertyAddress.value.trim(),
      agent: fields.lettingAgentName.value.trim(),
      tenant: fields.tenantName.value.trim(),
      time: fields.timeOfDay.value,
      date: fields.deliveryDate.value,
    };
  }

  function buildSubject(v) {
    const addr = v.address || '{{PropertyAddress}}';
    const agent = v.agent || '{{LettingAgentName}}';
    return `${addr} - Water Safety Checks for ${agent}`;
  }

  function buildBody(v) {
    const addr = v.address || '{{PropertyAddress}}';
    const date = v.date ? formatDate(v.date) : '{{DeliveryDate}}';
    const greeting = v.tenant 
      ? `Good ${v.time} ${v.tenant},` 
      : `Good ${v.time},`;

    return `${greeting}

I hope you are well.

I'm writing regarding the water sampling kit delivered to:

${addr}

Our records show that the sampling kit was delivered on ${date}. For your reference, proof of delivery has been attached to this email.

If you have not already done so, please complete the water samples and return them to us using the pre-paid returns label included within the sampling kit.

Returning the samples promptly will help us ensure your drinking water is free from toxic levels of lead as quickly as possible.

If you have already returned the samples, please disregard this email and accept our thanks.

Should you have any questions or require any assistance, please do not hesitate to get in touch.

Kind regards,`;
  }

  function renderPreview() {
    const v = getValues();
    previewSubject.textContent = buildSubject(v);

    let bodyHTML = buildBody(v)
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    previewBody.innerHTML = bodyHTML;
  }

  function copyEmail() {
    const v = getValues();
    const fullEmail = `Subject: ${buildSubject(v)}

${buildBody(v)}`;

    navigator.clipboard.writeText(fullEmail).then(() => {
      showToast('Copied to clipboard!');
    });
  }

  function openMailto() {
    const v = getValues();
    const subject = encodeURIComponent(buildSubject(v));
    const body = encodeURIComponent(buildBody(v));
    let mailto = `mailto:${v.recipient || ''}?subject=${subject}&body=${body}`;
    if (v.cc) mailto += `&cc=${encodeURIComponent(v.cc)}`;
    window.location.href = mailto;
    showToast('Opening mail app…');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2400);
  }

  // Live preview
  Object.values(fields).forEach(field => {
    field.addEventListener('input', renderPreview);
    field.addEventListener('change', renderPreview);
  });

  renderPreview();
</script>
</body>
</html>
